services:
  mysql:
    image: mysql:8.0
    container_name: hair_blog_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hair_blog
      MYSQL_USER: hairblog
      MYSQL_PASSWORD: hairblog123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
